<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h2>Formulários HTML</h2>
    <!-- 1 - Primeiro formulário -->
     <!-- 2 - Atributos -->
    <form action="register.php" method="GET">
        <div>
        <label>Nome:</label>
        <input type="text" /> 
    </div>
    <!-- 3 atributo name -->
     <div>
        <!-- 4 - Atributo label -->
        <label for="age"> Idade:</label>
        <input type="text" name="age">
     </div>
     <!-- 6 - Select -->
<div>
    <label for="job">Selecione a sua profissão</label>
    <select name="job">
        <option value="programador">Programador</option>
        <option value="tester">Tester/QA</option>
        <option value="devops">DevOps</option>
    </select>
</div>
<!-- 7 - Atributo selected -->
 <div>
    <label for="contract">Você leu os termos do contrato?</label>
    <select name="contract">
        <option value="sim">Sim</option>
        <option value="nao" selected>Não</option>
    </select>
 </div>
 <!-- 8 Multiplas opções -->
  <div>
    <label for="items">Selecione o item</label>
    <select name="items" multiple>
        <option value="pera">Pera</option>
        <option value="arroz">Arroz</option>
        <option value="feijao">Feijão</option>
        <option value="carne">Carne</option>
    </select>
  </div>

  <!-- 9 - textarea -->
   <div>
    <label for="comment">Escreva abaixo o que você achou do post</label>
    <textarea name="comment"></textarea>
   </div>

   <!-- 10 - fieldset e legend -->
   <div>
    <fieldset>
        <legend>Preencha as suas informações</legend>
        <label for="firstname">Nome</label>
        <input type="text" name="firstname">
        <label for="lastname">Sobrenome</label>
        <input type="text" name="lastname">
    </fieldset>
   </div>

   <!-- 11 - datalist -->
    <div>
        <label for="flavor">Escolha o sabor</label>
        <input type="text" list="flavors" name="flavor">

        <datalist id="flavors">
            <option value="Cereja"></option>
            <option value="Morango"></option>
            <option value="Abacaxi"></option>
            <option value="Babalu"></option>

        </datalist>
    </div>

    <!-- 12 - Senha -->
     <div>
        <label for="password">Digite a sua senha</label>
        <input type="password" name="password">
     </div>

     <!-- 13 resetar form -->
      <input type="reset" value="Limpar">

      <!-- 13 radio button -->
     <div>
        <label for="car_model">Escolha o modelo do seu carro</label>
        <div class="radio">
            <input type="radio" value="bmw" name="car_model">
            <label for="bmw">BMW</label>
        </div>
           <div class="radio">
            <input type="radio" value="fusca" name="car_model">
            <label for="fusca">Fusca</label>
        </div>
     </div>

     <!-- 15 - Checkbox -->
      <div>
        <label for="optionals">Opcionais do carro:</label>
        <div class="radio">
            <input type="checkbox" name="optionals[]" value="big_tires">
            <label for="big_tires">Pneus Grandes</label>
        <div class="radio">
            <input type="checkbox" name="optionals[]" value="small_tires">
            <label for="small_tires">Pequenos Pneus</label>
        <div class="radio">
            <input type="checkbox" name="optionals[]" value="turno_jato">
            <label for="turbo_jato">Turbo Jato</label>
        </div>
      </div>

     <!--  5 - Envio Form -->
       <input type="submit" value="Enviar">
    </form>
    
</body>
</html>
